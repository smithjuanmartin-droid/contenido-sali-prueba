<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salitrada — Sistema de Contenido Invierno</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand: #FAF8F4;
    --sand-dark: #F0ECE4;
    --coral: #D4725A;
    --coral-light: #F2C4B8;
    --ocean: #3A7CA5;
    --ocean-light: #B8D8EC;
    --launch: #5C8A5C;
    --launch-light: #BDD8BD;
    --navy: #1C2B3A;
    --gray: #6B7280;
    --gray-light: #E5E7EB;
    --white: #FFFFFF;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--sand);
    color: var(--navy);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--coral-light); }
  .subtitle-header {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  /* MAIN */
  main { padding: 40px; max-width: 1400px; margin: 0 auto; }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--white);
    border: 1px solid var(--gray-light);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .dot-f1 { background: var(--coral); }
  .dot-f2 { background: var(--ocean); }
  .dot-f3 { background: var(--launch); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 10px 24px;
    border-radius: 100px;
    border: 2px solid var(--gray-light);
    background: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--gray);
  }
  .filter-btn:hover { border-color: var(--navy); color: var(--navy); }
  .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .filter-btn.f1.active { background: var(--coral); border-color: var(--coral); }
  .filter-btn.f2.active { background: var(--ocean); border-color: var(--ocean); }
  .filter-btn.f3.active { background: var(--launch); border-color: var(--launch); }

  /* PHASE HEADERS */
  .phase-header {
    margin: 40px 0 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .phase-header:first-of-type { margin-top: 0; }
  .phase-badge {
    padding: 6px 18px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .phase-badge.f1 { background: var(--coral); color: var(--white); }
  .phase-badge.f2 { background: var(--ocean); color: var(--white); }
  .phase-badge.f3 { background: var(--launch); color: var(--white); }
  .phase-title { font-size: 18px; font-weight: 600; }
  .phase-dates { font-size: 13px; color: var(--gray); margin-left: auto; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 8px;
  }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card.f1::before { background: var(--coral); }
  .card.f2::before { background: var(--ocean); }
  .card.f3::before { background: var(--launch); }
  .card:hover { border-color: var(--navy); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(28,43,58,0.1); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .card-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 1px;
  }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    border: 1.5px solid;
  }
  .badge-pilar { color: var(--navy); border-color: var(--gray-light); background: var(--sand); }
  .badge-formato { color: var(--gray); border-color: var(--gray-light); background: var(--white); }

  .card-hook {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--navy);
    margin-bottom: 10px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--gray);
    line-height: 1.5;
  }
  .card-arrow {
    position: absolute;
    bottom: 20px; right: 20px;
    font-size: 18px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .card-arrow { opacity: 1; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,43,58,0.6);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.2s;
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-top-bar {
    height: 4px;
    border-radius: 20px 20px 0 0;
  }
  .modal-top-bar.f1 { background: var(--coral); }
  .modal-top-bar.f2 { background: var(--ocean); }
  .modal-top-bar.f3 { background: var(--launch); }

  .modal-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--gray-light);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .modal-meta { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .modal-num { font-size: 12px; color: var(--gray); font-weight: 600; letter-spacing: 1px; }
  .modal-title { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .modal-close {
    background: var(--sand);
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--navy);
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--gray-light); }

  .modal-body { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }

  .brief-section { }
  .brief-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gray);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brief-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-light);
  }
  .brief-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--navy);
  }
  .brief-content p { margin-bottom: 8px; }
  .brief-content p:last-child { margin-bottom: 0; }

  .guion-line {
    background: var(--sand);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
    border-left: 3px solid var(--gray-light);
  }
  .guion-line:last-child { margin-bottom: 0; }
  .guion-time {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 2px;
  }

  .copy-box {
    background: var(--sand);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.7;
    position: relative;
    border: 1px dashed var(--gray-light);
  }
  .copy-chip {
    display: inline-block;
    background: var(--navy);
    color: var(--white);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .tag-story {
    background: #FFF3E0;
    color: #E65100;
    border-color: #FFCCBC;
  }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--sand); }
  ::-webkit-scrollbar-thumb { background: var(--gray-light); border-radius: 3px; }

  @media (max-width: 600px) {
    main { padding: 20px; }
    header { padding: 16px 20px; }
    .modal-header, .modal-body { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Salitrada <span>✦</span></div>
    <div class="subtitle-header">Sistema de Contenido — Lanzamiento Invierno</div>
  </div>
  <div style="text-align:right;">
    <div style="font-size:13px;color:rgba(255,255,255,0.7);font-weight:500;">30 piezas creativas</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.4);">25 mar → 24 abr 2025</div>
  </div>
</header>

<main>

  <div class="stats">
    <div class="stat-pill"><span class="dot dot-f1"></span> Fase 1: Anticipación — 12 piezas</div>
    <div class="stat-pill"><span class="dot dot-f2"></span> Fase 2: Countdown — 9 piezas</div>
    <div class="stat-pill"><span class="dot dot-f3"></span> Fase 3: Lanzamiento — 10 piezas</div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCards('all', this)">Todas</button>
    <button class="filter-btn f1" onclick="filterCards('f1', this)">Fase 1 — Anticipación</button>
    <button class="filter-btn f2" onclick="filterCards('f2', this)">Fase 2 — Countdown</button>
    <button class="filter-btn f3" onclick="filterCards('f3', this)">Fase 3 — Lanzamiento</button>
  </div>

  <div id="cards-container"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-top-bar" id="modal-top-bar"></div>
    <div class="modal-header">
      <div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-num" id="modal-num"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="brief-section">
        <div class="brief-label">💡 Idea del Anuncio</div>
        <div class="brief-content" id="modal-idea"></div>
      </div>
      <div class="brief-section">
        <div class="brief-label">🎬 Guión</div>
        <div id="modal-guion"></div>
      </div>
      <div class="brief-section">
        <div class="brief-label">✍️ Copy del Post</div>
        <div id="modal-copy"></div>
      </div>
    </div>
  </div>
</div>

// ── RENDER ──────────────────────────────────────────────────────────────────

function getPhaseMeta(fase) {
  const meta = {
    f1: { label: 'Fase 1 — Anticipación', dates: '25 mar → 7 abr', class: 'f1' },
    f2: { label: 'Fase 2 — Countdown', dates: '8 abr → 14 abr', class: 'f2' },
    f3: { label: 'Fase 3 — Lanzamiento', dates: '15 abr → 24 abr', class: 'f3' },
  };
  return meta[fase];
}

function renderCards(filter) {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  const phases = ['f1', 'f2', 'f3'];
  phases.forEach(fase => {
    const items = content.filter(c => c.fase === fase && (filter === 'all' || filter === fase));
    if (items.length === 0) return;

    const meta = getPhaseMeta(fase);

    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `
      <span class="phase-badge ${meta.class}">${meta.label}</span>
      <span class="phase-dates">${meta.dates}</span>
    `;
    container.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'grid';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = `card ${item.fase}`;
      card.onclick = () => openModal(item);

      const formatoLabel = FORMATOS[item.formato] || item.formato;
      const pilarLabel = PILARES[item.pilar] || item.pilar;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-num">#${String(item.id).padStart(2,'0')}</span>
          <div class="badges">
            <span class="badge badge-pilar">${pilarLabel}</span>
            <span class="badge badge-formato">${formatoLabel}</span>
          </div>
        </div>
        <div class="card-hook">${item.hook}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-arrow">→</div>
      `;
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}

// ── MODAL ──────────────────────────────────────────────────────────────────

function openModal(item) {
  const meta = getPhaseMeta(item.fase);
  const pilarLabel = PILARES[item.pilar] || item.pilar;
  const formatoLabel = FORMATOS[item.formato] || item.formato;

  document.getElementById('modal-top-bar').className = `modal-top-bar ${item.fase}`;
  document.getElementById('modal-num').textContent = `#${String(item.id).padStart(2,'0')} — ${meta.label}`;
  document.getElementById('modal-meta').innerHTML = `
    <span class="badge badge-pilar">${pilarLabel}</span>
    <span class="badge badge-formato">${formatoLabel}</span>
  `;
  document.getElementById('modal-title').textContent = item.hook;

  // Idea
  document.getElementById('modal-idea').innerHTML = `<p>${item.idea}</p>`;

  // Guión
  const guionEl = document.getElementById('modal-guion');
  if (item.guion && item.guion.length > 0) {
    guionEl.innerHTML = item.guion.map(g => `
      <div class="guion-line">
        <span class="guion-time">${g.time}</span>
        ${g.text}
      </div>
    `).join('');
  } else {
    guionEl.innerHTML = '<p style="color:#6B7280">Sin guión detallado para este formato.</p>';
  }

  // Copy
  const copyEl = document.getElementById('modal-copy');
  if (item.copy && item.copy !== '(Solo stories — no requiere copy de feed)') {
    copyEl.innerHTML = `
      <div class="copy-box">
        <span class="copy-chip">COPY PARA EL POST</span><br>
        ${item.copy.replace(/\n/g, '<br>')}
      </div>
    `;
  } else {
    copyEl.innerHTML = `
      <div class="copy-box" style="color:#6B7280;font-style:italic;">
        ${item.copy}
      </div>
    `;
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── INIT ───────────────────────────────────────────────────────────────────
renderCards('all');
</script>
